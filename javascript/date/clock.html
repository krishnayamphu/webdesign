<!DOCTYPE html>
<html>
<head>
	<title>JS</title>
	<style type="text/css">
		.clock{
			background: url(bg.jpg) no-repeat orange;
		    height: 223px;
		    width: 306px;
		    position: relative;
		}
		.clock input[type="text"]{
			width: 180px;
			font-size: 45px;
			position: absolute;
			top: 106px;
			background-color: transparent;
			left: 84px;
			letter-spacing: 17px;
			border: none;
		}
	</style>
</head>
<body>
<div class="clock">
	<input type="text" id="clock">
</div>


<input type="text" id="digitalClock">

<script type="text/javascript">

function clock() {
var date=new Date();
var h=date.getHours();
var m=date.getMinutes();


document.getElementById("clock").value=h+" "+m;
}
setInterval("clock()",1000);

function digitalClock() {
var date=new Date();
var h=date.getHours();
if(h>12){
	h=h-12;
}
var m=date.getMinutes();
var s=date.getSeconds();
var ms=date.getMilliseconds();

document.getElementById("digitalClock").value=h+":"+m+":"+s+":"+ms;
}
setInterval("digitalClock()",1);
</script>
</body>
</html>
