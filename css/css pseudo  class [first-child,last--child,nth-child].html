<!DOCTYPE html>
<html>
<head>
	<title>css</title>
	<style type="text/css">
	p:first-child{color:green;}
	p:last-child{color:purple;}
	p:nth-child(2){color:red;}

	ul{
		list-style: none;
		width: 100px;
	}

	li{ border-bottom: 1px solid #ccc; }
	li:last-child{border-bottom: none;}
	</style>
</head>
<body>
<p>Paragraph 1</p>
<p>Paragraph 2</p>
<p>Paragraph 3</p>
<p>Paragraph 4</p>

<hr>	
<ul>
	<li>List 1</li>
	<li>List 2</li>
	<li>List 3</li>
	<li>List 4</li>
</ul>
</body>
</html>
