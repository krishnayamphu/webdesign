<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>JavaScript</title>
  </head>
  <body>
    <script>
      document.write(parseInt("10"));
      document.write("<br>" + parseInt("10.5"));
      document.write("<br>" + parseInt("10 a"));
      document.write("<br>" + parseInt("a 10.5"));

      document.write(parseFloat("10"));
      document.write("<br>" + parseFloat("10.5"));
      document.write("<br>" + parseFloat("10 a"));
      document.write("<br>" + parseFloat("a 10.5"));

      document.write("<br>" + eval("10+5"));
      document.write("<br>" + eval("10a+5"));
    </script>
  </body>
</html>
