<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
	<title>form</title>
</head>
<body>

<form>
	<label>Email</label>
	<input type="email" name="" placeholder="example@gmail.com" required>
	<br><br>

	<label>Password</label>
	<input type="password" name="" placeholder="password" required>
	<br><br>

	<label>Gender</label>
	<input type="radio" name="gender" value="m" checked>Male
	<input type="radio" name="gender" value="f">Female
	<br><br>

	<label>Course</label>
	<input type="checkbox" name="courses" value="basic">Basic
	<input type="checkbox" name="courses" value="web" checked>Web
	<br><br>

	<label>Textarea</label>
	<textarea rows="5" cols="30"></textarea>
	<br><br>

	<label>Country</label>
	<select name="country">
		<option value="Nepal">Nepal</option>
		<option value="India" selected>India</option>
		<option value="China">China</option>
	</select>
	<br><br>

	<label>Date</label>
	<input type="date" name=""><br><br>
	<input type="time" name=""><br><br>
	<input type="datetime-local" name="">
	<br><br>

	<label>Search</label>
	<input type="search" name="" placeholder="search here">
	<br><br>

	<label>Tel</label>
	<input type="tel" name="">
	<br><br>

	<label>color</label>
	<input type="color" name="">
	<br><br>

	<label>File</label>
	<input type="file" name="">
	<br><br>

	<label>Image</label>
	<input type="image" src="check.png"  name="">
	<br><br>

	<label>Range</label>
	<input type="range" value=50 min=0 max=100 name="">
	<br><br>

	<label>Number</label>
	<input type="number" name="">
	<br><br>

	<input type="hidden" value="test message" name="">
	
	<button>Submit</button>	
</form>

</body>
</html>
