<!DOCTYPE html>
<html>
<head>
	<title>Flexbox</title>

	<style type="text/css">
		.container1{
			border: 1px solid red;
			display: flex;
		}
	 	.item{
			background-color: orange;
			padding: 5px 15px;
			flex-grow: 1;
			flex-basis: 200px;
		}
	 	.item:nth-child(even){
			background-color: green;
			flex-shrink: 3;
			
		}


	</style>
</head>
<body>
	<h4>flex-shrink:3</h4>
	<div class="container1">
		<div class="item">Item 1</div>
		<div class="item">Item 2</div>
		<div class="item">Item 3</div>
	</div>
</body>
</html>
