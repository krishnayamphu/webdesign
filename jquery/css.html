<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>jQuery</title>
    <style>
        p{
            font-family: Arial, Helvetica, sans-serif;
            padding: 15px;
            margin: 0;
            margin-top: 15px;
        }
    </style>
  <body>
    <button id="btn1">Apply CSS</button>
    <p>
      Lorem ipsum dolor sit amet consectetur adipisicing elit. Tempore unde
      doloribus ab ipsa laboriosam maxime. Qui, provident perferendis temporibus
      nihil consequatur consectetur corporis corrupti inventore vitae, quam
      nesciunt earum sapiente!
    </p>
    <script src="jquery-3.7.1.min.js"></script>
    <script>
      $(document).ready(function () {
        
        $("#btn1").click(function () {
          $("p").css({
            "color":"white",
            "background-color":"black",
            "width":"500px"
          });
        });

      
      });
    </script>
  </body>
</html>
