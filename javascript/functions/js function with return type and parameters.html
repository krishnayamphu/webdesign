<!DOCTYPE html>
<html>
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title>js</title>
</head>
<body>
<script type="text/javascript">

/*
functions
==============
1. general function
2. function with return type
3. function with parameters
4. function with return type and parameters

#Function with return type and parameters:

#1 function definition

function functionName(param1,param2,...){
	//statements
	return value;
}

#2 function calling/invoking
-functionName(arg1,arg2,...);
-var varname=functionName(arg1,arg2);
*/

function getDiscountAmount(price,discountPercentage) {
	var amount=price*(discountPercentage/100);
	return amount;
}

var discountAmount=getDiscountAmount(1000,10);
document.write("Discount Amount: Rs. "+discountAmount);

</script>

</body>
</html>
