<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>css</title>
    <style>
      div {
        width: 100px;
        height: 50px;
        background-color: green;
        margin: 5px;
        display: inline;
      }
      span {
        background-color: tomato;
        width: 200px;
        display: block;
        margin: 5px;
      }
      p {
        display: none;
      }
      a {
        display: inline-block;
        background-color: blueviolet;
        width: 100px;
        height: 30px;
        color: white;
        text-align: center;
        line-height: 30px;
      }
    </style>
  </head>
  <body>
    <div class="box1">box1</div>
    <div class="box2">box2</div>

    <hr />

    <span>Inline 1</span>
    <span>Inline 2</span>

    <p>
      Lorem ipsum dolor sit amet, consectetur adipisicing elit. Est tempore
      quibusdam nostrum eius eum totam, illum necessitatibus id minus voluptates
      hic facilis consequuntur odit veniam labore impedit quod libero enim!
    </p>

    <hr />
    <a href="#">Link 1</a>
    <a href="#">Link 2</a>
  </body>
</html>
