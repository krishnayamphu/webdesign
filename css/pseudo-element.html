<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>css</title>
    <style>
      h1::first-letter {
        font-size: 60px;
        color: red;
        font-style: italic;
      }
      p::first-line {
        color: green;
      }

      p::before {
        content: open-quote;
      }
      p::after {
        content: close-quote;
      }
      h2::after {
        content: url("ok.png");
      }
      h2::before {
        content: "❤️❤️❤️";
      }

      ::selection {
        background-color: red;
        color: yellow;
      }

      ul li {
        color: green;
      }
      ul li::marker {
        color: red;
      }
    </style>
  </head>
  <body>
    <h1>Hello World</h1>
    <p>
      Lorem ipsum dolor sit amet consectetur adipisicing elit. Recusandae, ex,
      fuga nisi nemo ipsum repellendus molestias, ipsam maiores dolores
      reprehenderit facilis excepturi. Sit, ipsa. In itaque modi libero tenetur
      ex.
    </p>

    <h2>Welcome</h2>

    <ul>
      <li>List 1</li>
      <li>List 2</li>
      <li>List 3</li>
    </ul>
  </body>
</html>
