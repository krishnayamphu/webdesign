<!DOCTYPE html>
<html>
<head>
	<title>JS</title>
	<style type="text/css">
		img{
			width: 600px;
			height: 400px;
			margin: 60px auto;
			object-fit: cover;
			display: block;
		}
	</style>
</head>
<body>
<img id="pic" src="p1.jpg">
<script type="text/javascript">

/* 
setInterval(function_name,time);
1s=1000ms
 */
var i=0;
function changePic() {
	let name=["p1.jpg","p2.jpg","p3.jpg"];
	document.getElementById("pic").src=name[i];
	i++;
	if(i==3)
		i=0;
}


setInterval("changePic()",1000)

</script>
</body>
</html>
