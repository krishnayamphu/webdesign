<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>css</title>
    <style>
      .box {
        width: 100px;
        height: 100px;
        background-color: red;
      }
      .box:hover {
        border-radius: 50%;
        background-color: blue;
        transition-property: all;
        transition-duration: 5s;
        transition-timing-function: ease;
        transition-delay: 0s;
      }

      .box2 {
        width: 100px;
        height: 100px;
        background-color: red;
        position: relative;
        left: 0;
      }
      .box2:hover {
        left: 10%;
        transition: all 1s;
      }

      .box3 {
        width: 100px;
        height: 20px;
        background-color: rgb(16, 87, 52);
        margin-top: 15px;
        transition: all 1s;
      }
      .box3:hover {
        width: 200px;
      }

      h1 {
        color: red;
        -webkit-transition: all 1s;
        -moz-transition: all 1s;
        transition: all 1s;
      }
      h1:hover {
        color: green;
      }
    </style>
  </head>
  <body>
    <div class="box">box</div>

    <h1>HELLO</h1>

    <div class="box2"></div>
    <div class="box3"></div>
  </body>
</html>
