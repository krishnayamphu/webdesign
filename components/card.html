<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>css3</title>
    <style>
      * {
        font-family: Arial, Helvetica, sans-serif;
      }
      .card {
        width: 300px;
        box-shadow: 0 0 2px #9b9494;
        border-radius: 5px;
      }
      .card img {
        width: 100%;
        border-radius: 5px 5px 0 0;
      }
      .card-body {
        padding: 15px;
      }
      button {
        background-color: #3b71ca;
        border: none;
        color: white;
        border-radius: 2px;
        box-shadow: 0 0 2px #696969;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <img src="images/background.jpg" alt="" />
      <div class="card-body">
        <h3>Hello World</h3>
        <p>
          Lorem ipsum dolor sit amet, consectetur adipisicing elit. Voluptas
          explicabo laboriosam officiis cumque! Dignissimos, vel! Natus alias
          facere neque placeat ratione, ducimus magni animi eos reprehenderit
          cum officia nihil nulla?
        </p>
        <button>Button</button>
      </div>
    </div>
  </body>
</html>
