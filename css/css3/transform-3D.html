<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>css3</title>
    <style>
      .row {
        border: 1px solid red;
        overflow: hidden;
        perspective: 500px;
        margin-bottom: 15px;
      }
      .item {
        width: 100px;
        height: 100px;
        background-color: red;
        float: left;
        margin: 15px;
        transition: all 1s;
        color: white;
      }
      .box1:hover {
        transform: translateX(50px);
      }
      .box2:hover {
        transform: translateY(50px);
      }
      .box3:hover {
        transform: translateZ(-50px);
      }
      .box4:hover {
        transform: translate3d(50px, 50px, -50px);
      }
      .box5:hover {
        transform: scaleX(2);
      }
      .box6:hover {
        transform: scaleY(2);
      }
      .box7:hover {
        transform: scaleZ(2);
      }
      .box8:hover {
        transform: scale3d(2, 2, 2);
      }
      .box9:hover {
        transform: rotateX(45deg);
      }
      .box10:hover {
        transform: rotateY(180deg);
      }
      .box11:hover {
        transform: rotateZ(45deg);
      }
      .box12:hover {
        transform: rotate3d(1, 1, 1, 45deg);
      }
    </style>
  </head>
  <body>
    <div class="row">
      <div class="item box1">translate</div>
      <div class="item box2">translate</div>
      <div class="item box3">translate</div>
      <div class="item box4">translate</div>
    </div>

    <div class="row">
      <div class="item box5">scale</div>
      <div class="item box6">scale</div>
      <div class="item box7">scale</div>
      <div class="item box8">scale</div>
    </div>

    <div class="row">
      <div class="item box9">rotate</div>
      <div class="item box10">rotate</div>
      <div class="item box11">rotate</div>
      <div class="item box12">rotate</div>
    </div>
  </body>
</html>
