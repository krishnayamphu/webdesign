<!DOCTYPE html>
<html>
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title>jQuery</title>
</head>
<body>
<button id="btn1">After</button>
<button id="btn2">Before</button>
<p>Hello World</p>


<script type="text/javascript" src="jquery.js"></script>
<script type="text/javascript">
$(function(){
	
	$("#btn1").click(function(){
		$("p").after("<p>welcome</p>");
	});

	$("#btn2").click(function(){
		$("p").before("<p>welcome</p>");
	});
	

});
</script>

</body>
</html>
