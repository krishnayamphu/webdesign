<!DOCTYPE html>
<html>
<head>
	<title>JS</title>
</head>
<body>

<script type="text/javascript">

/*
Array Declaration
#1:
var varname=[value1, value2,...];

#2:
var varname=new Array(value1, value2,...);

Accessing Array Elements value:
varname[index];

index value always start with zero (0).


*/
var num=[10,12,14,16];
var days=["sun","mon","tue","wed","thu","fri","sat"];

document.write(num[0]);
document.write("<br>");

for(i=0; i<4;i++){
	document.write(" "+num[i]);
}

document.write("<br>");

for(i=0; i<7;i++){
	document.write(" "+days[i]);
}


</script>
</body>
</html>
