<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>css3</title>
    <style>
      div {
        width: 600px;
        height: 300px;
        border: 1px solid red;
        float: left;
        margin: 15px;
      }
      .box1 {
        background-image: linear-gradient(
            rgba(255, 0, 0, 0.5),
            rgba(0, 0, 255, 0.5)
          ),
          url(images/bg.jpg);
        background-size: cover;
      }
      .box2 {
        background-image: linear-gradient(
            rgba(0, 0, 0, 0.5),
            rgba(0, 0, 0, 0.5)
          ),
          url(images/bg.jpg);
        background-size: cover;
        color: white;
        display: flex;
        justify-content: center;
        align-items: center;
        font-size: 60px;
      }
    </style>
  </head>
  <body>
    <div class="box1"></div>
    <div class="box2">Banner Image</div>
  </body>
</html>
