<!DOCTYPE html>
<html>
<head>
	<title>css</title>
	<style type="text/css">
		*{
			font-family: arial;
			margin: 0;
			padding: 0;
			color:white;
		}
		div{
			width: 200px;
			height: 200px;
		}
		.box1{
			background: red;
			position: absolute;
			z-index: 3;
		}
		.box2{
			background: green;
			position: absolute;
			top:50px;
			left: 50px;
			z-index: 2;
		}
		.box3{
			background: blue;
			position: absolute;
			top:100px;
			left: 100px;
			z-index: 1;
		}
	</style>
</head>
</head>
<body>
<div class="box1">box 1</div>
<div class="box2">box 2</div>
<div class="box3">box 3</div>
</body>
</html>
