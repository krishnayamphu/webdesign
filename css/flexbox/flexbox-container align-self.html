<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Flexbox</title>
    <style>
      * {
        font-family: Arial, Helvetica, sans-serif;
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      .row {
        border: 1px solid red;
        margin: 15px 30px;
        display: flex;
        height: 100px;
        align-items: stretch;
      }
      .col {
        background-color: green;
      }
      .col:nth-child(even) {
        background-color: orange;
      }
      .center {
        align-self: center;
      }
    </style>
  </head>
  <body>
    <div class="row">
      <div class="col">col1</div>
      <div class="col">col2</div>
      <div class="col">col3</div>
    </div>

    <div class="row">
      <div class="col">col1</div>
      <div class="col center">col2</div>
      <div class="col">col3</div>
    </div>
  </body>
</html>
