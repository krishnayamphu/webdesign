<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>js</title>
  </head>
  <body>
    <script>
      const date = new Date();
      let d = date.getDay() + 1; //0-6
      let da = date.getDate();
      let mo = date.getMonth() + 1; //0-11
      let y = date.getFullYear();

      let h = date.getHours(); //24hrs
      let mi = date.getMinutes(); //0-59
      let s = date.getSeconds();
      let ms = date.getMilliseconds(); //0-999

      document.write(date);
      document.write("<br>" + d + " " + da + "-" + mo + "-" + y);
      document.write("<br>" + h + " : " + mi + " : " + ms);
    </script>
  </body>
</html>
