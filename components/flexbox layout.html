<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Flexbox</title>
    <style>
      * {
        font-family: Arial, Helvetica, sans-serif;
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      .row {
        margin: 15px 30px;
        display: flex;
      }
      .col {
        padding: 15px;
      }

      .grow-1 {
        flex-grow: 1;
      }
      .grow-2 {
        flex-grow: 2;
      }

      img {
        max-width: 600px;
        width: 100%;
      }
      h1 {
        color: purple;
      }

      h3 {
        color: purple;
      }
      ul {
        list-style: none;
      }

      .fb-300 {
        flex-basis: 300px;
      }
      .w-half {
        width: 50%;
      }
    </style>
  </head>
  <body>
    <div class="row">
      <div class="col w-half fb-300 grow-1">
        <h3>Latest Updates</h3>
        <ul>
          <li>List 1</li>
          <li>List 2</li>
          <li>List 3</li>
        </ul>
      </div>
      <div class="col w-half grow-2">
        <h1>Hello World</h1>
        <p>
          Lorem ipsum dolor sit amet consectetur adipisicing elit. Dolor quis
          ipsum magni obcaecati error amet sapiente saepe voluptatum, quasi
          quas! Autem perspiciatis hic eius sapiente iusto nihil fugiat ipsum
          excepturi!
        </p>
        <img src="images/bg.jpg" alt="" />
      </div>
    </div>
  </body>
</html>
