<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>jquery</title>
    <style>
      * {
        font-family: Arial, Helvetica, sans-serif;
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      .box {
        background-color: blueviolet;
        padding: 15px;
        margin-top: 10px;
      }
    </style>
  </head>
  <body>
    <button id="btn1">Remove</button>
    <button id="btn2">Clear</button>
    <div class="box">
      <h1>Heading</h1>
      <p>
        Lorem ipsum dolor sit amet consectetur adipisicing elit. Accusantium
        recusandae minus beatae aspernatur ad, fugiat aliquid atque quisquam
        illo veritatis enim non voluptates iusto voluptatem officiis culpa eos
        sequi officia!
      </p>
    </div>
    <script src="jquery-3.7.1.min.js"></script>
    <script>
      $(function () {
        $("#btn1").click(function () {
          $(".box").remove();
        });

        $("#btn2").click(function () {
          $(".box").empty();
        });
      });
    </script>
  </body>
</html>
