<!DOCTYPE html>
<html>
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title>JS DOM</title>
</head>
<body>

<form name="myform">
	<label>Value:</label>
	<input type="text" name="test">
	<button onclick="getData()">Submit</button>
</form>

<script type="text/javascript">
	function getData() {
		var data=document.forms['myform'].test.value;
		alert(data);
	}

</script>
</body>
</html>
