<!DOCTYPE html>
<html>
<head>
	<title>css3</title>
	<style type="text/css">
		*{
			margin: 0;
			padding: 0;
			font-family: arial;
			transition: all 1s;
		}
		.container{
			width: 300px;
			height: 300px;
			margin: 50px auto;	
			border: 5px solid red;
			perspective: 1000px;
		}

		.box1{
			width: 100px;
			height: 100px;
			background: green;
			transform: rotateY(45deg);
			transform-origin: 280px 0;
		}
	</style>
</head>
<body>

<div class="container">
	<div class="box1">box1</div>
</div>

</body>
</html>
