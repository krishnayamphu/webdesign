<!DOCTYPE html>
<html>
<head>
	<title>js</title>
</head>
<body>
<script type="text/javascript">
	var color="red";
	switch(color){
		case "red":
		document.bgColor="red";
		document.write("background color red is set successfully.");
		break;
		case "green":
		document.bgColor="green";
		document.write("background color green is set successfully.");
		break;
		case "blue":
		document.bgColor="blue";
		document.write("background color blue is set successfully.");
		break;
		default:
		document.write("Only red,green and blue value is accepted."); break;
	}

</script>
</body>
</html>
