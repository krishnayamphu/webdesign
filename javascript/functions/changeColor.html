<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>JavaScript</title>
  </head>
  <body id="app">
    <button onclick="changeBG()">Green Background</button>
    <button onclick="setTextWhite()">White Text</button>
    <p>
      Lorem ipsum, dolor sit amet consectetur adipisicing elit. Mollitia nihil
      exercitationem veniam libero inventore nesciunt, fuga corporis nobis
      possimus quam sit quibusdam nemo obcaecati ipsum cupiditate quia voluptate
      vitae aliquam?
    </p>
    <script>
      function changeBG() {
        document.bgColor = "green";
      }
      function setTextWhite() {
        document.getElementById("app").style.color = "white";
      }
    </script>
  </body>
</html>
