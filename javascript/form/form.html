<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>js</title>
  </head>
  <body>
    <form name="myform" onsubmit="return valid()">
      <input type="text" name="t1" placeholder="Enter some data" />
      <button>Submit</button>
    </form>

    <script>
      function valid() {
        let data = document.forms["myform"].t1.value;
        if (data == "") {
          alert("This field is required");
          document.forms["myform"].t1.focus();
          return false;
        } else {
          alert(data);
          return true;
        }
      }
    </script>
  </body>
</html>
