<!DOCTYPE html>
<html>
<head>
	<title>Flexbox</title>

	<style type="text/css">
		.container1{
			border: 1px solid red;
			display: flex;
		}
		.container1 .item{
			background-color: orange;
			padding: 5px 15px;
			flex-grow: 1;
		}
		.container1 .item:nth-child(even){
			background-color: green;
		}

		.container2{
			border: 1px solid red;
			display: flex;
		}

		.container2 .item{
			background-color: orange;
			padding: 5px 15px;
			flex-grow: 1;
		}
		.container2 .item:nth-child(even){
			background-color: green;
			flex-grow: 3;
		}

	</style>
</head>
<body>
	<h4>flex-grow:1</h4>
	<div class="container1">
		<div class="item">flex-grow:1</div>
		<div class="item">flex-grow:1</div>
		<div class="item">flex-grow:1</div>
	</div>

	<h4>flex-grow:3</h4>
	<div class="container2">
		<div class="item">flex-grow:1</div>
		<div class="item">flex-grow:3</div>
		<div class="item">flex-grow:1</div>
	</div>
</body>
</html>
