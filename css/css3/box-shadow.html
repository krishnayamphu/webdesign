<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>css3</title>
    <style>
      div {
        width: 100px;
        height: 100px;
        background-color: rgb(251, 227, 223);
        float: left;
        margin: 15px;
      }
      .box1 {
        box-shadow: 2px 2px 2px #222;
      }
      .box2 {
        box-shadow: -5px -5px 2px #222;
      }
      .box3 {
        box-shadow: 2px 2px 10px 10px #222;
      }
      .box4 {
        box-shadow: 0px 0px 5px #6dfc00;
      }
      .box5 {
        background-color: white;
        box-shadow: 0 0 5px #222;
      }
      .box6 {
        border-radius: 50%;
        box-shadow: 0 5px 6px 2px #222;
      }
      .box7 {
        box-shadow: 5px 5px 5px red, -5px -5px 5px green;
      }
      .box8 {
        box-shadow: 0px 0px 5px red inset;
      }
      .box9 {
        box-shadow: 0px 5px 5px red inset;
      }
    </style>
  </head>
  <body>
    <div></div>
    <div class="box1"></div>
    <div class="box2"></div>
    <div class="box3"></div>
    <div class="box4"></div>
    <div class="box5"></div>
    <div class="box6"></div>
    <div class="box7"></div>
    <div class="box8"></div>
    <div class="box9"></div>
  </body>
</html>
