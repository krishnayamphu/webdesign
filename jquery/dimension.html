<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>jquery</title>
    <style>
      * {
        font-family: Arial, Helvetica, sans-serif;
        margin: 0;
        padding: 0;
      }
      body {
        padding: 15px;
      }
      .box {
        background-color: blueviolet;
        height: 100px;
        width: 100px;
        padding: 10px;
        border: 10px solid red;
        margin: 10px;
      }
      p {
        margin-top: 15px;
      }
    </style>
  </head>
  <body>
    <div class="box">box</div>
    <p id="w"></p>
    <script src="jquery-3.7.1.min.js"></script>
    <script>
      $(function () {
        let width = $(".box").width();
        let innerWidth = $(".box").innerWidth();
        let outerWidth = $(".box").outerWidth();
        let outerWidthMargin = $(".box").outerWidth(true);
        $("#w").text(
          "width:" +
            width +
            ", innerWidth:" +
            innerWidth +
            ", outerWidth:" +
            outerWidth +
            ", outerWidth(true):" +
            outerWidthMargin
        );
      });
    </script>
  </body>
</html>
