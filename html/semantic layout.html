<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>html</title>
    <style>
      header {
        background-color: aqua;
        padding: 15px;
      }
      nav {
        background-color: tomato;
        padding: 5px 15px;
      }
      main {
        background-color: gray;
      }
      .content {
        background-color: rgb(177, 219, 255);
        width: 70%;
        float: left;
      }
      section {
        background-color: rgb(115, 76, 165);
        height: 100px;
      }
      aside {
        background-color: rgb(255, 170, 139);
        width: 30%;
        height: 200px;
        float: left;
      }
      article {
        height: 100px;
      }
      footer {
        background-color: yellowgreen;
        clear: left;
      }
    </style>
  </head>
  <body>
    <header>header</header>
    <nav>nav</nav>
    <main>
      <div class="content">
        <section>section</section>
        <article>article</article>
      </div>
      <aside>aside</aside>
    </main>
    <footer>footer</footer>
  </body>
</html>
