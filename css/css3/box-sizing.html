<!DOCTYPE html>
<html>
<head>
	<title>css3</title>
	<style type="text/css">
		/*
		*{
			box-sizing: border-box;
		}
		*/
		div{
			width: 100px;
			height: 100px;
			background: green;
			float: left;
			margin:15px;
		}
		.box2{
			padding: 10px;
		}
		.box3{
			padding: 10px;
			border: 10px solid red;
		}
		.box4{
			padding: 10px;
			border: 10px solid red;
			box-sizing:border-box;
		}
	</style>
</head>
<body>
	<div class="box1">100x100</div>
	<div class="box2">100x100</div>
	<div class="box3">100x100</div>
	<div class="box4">100x100</div>
</body>
</html>
