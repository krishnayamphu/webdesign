<!DOCTYPE html>
<html>
<head>
	<title>css</title>
	<style type="text/css">
		ul.list1{
			list-style-type: square;
			list-style-position: inside;
		}

		ul.list2{
			list-style-type: disc;
			list-style-position: inside;
			list-style-image: url('check.png');
		}

		ol.list3{
			list-style-type: upper-roman;
			list-style-position: inside;
		}


		ul.list4{
			list-style: none;
		}
	</style>
</head>
<body>
<ul class="list1">
	<li>List Item</li>
	<li>List Item</li>
	<li>List Item</li>
	<li>List Item</li>
</ul>

<ul class="list2">
	<li>List Item</li>
	<li>List Item</li>
	<li>List Item</li>
	<li>List Item</li>
</ul>

<ol class="list3">
	<li>List Item</li>
	<li>List Item</li>
	<li>List Item</li>
	<li>List Item</li>
</ol>


<ul class="list4">
	<li>List Item</li>
	<li>List Item</li>
	<li>List Item</li>
	<li>List Item</li>
</ul>
</body>
</html>
