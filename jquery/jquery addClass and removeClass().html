<!DOCTYPE html>
<html>
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title>jQuery</title>
	<style type="text/css">
		.box{
			padding: 15px;
			border: 2px solid red;
			background: #ccc;
			margin: 15px;
		}
	</style>
</head>
<body>
<button id="btn1">Add CSS Class</button>
<button id="btn2">Remove CSS Class</button>
<button id="btn3">Toggle CSS Class</button>
<div>
	<h1>JQuery Element</h1>
	<p>Hello World</p>
	test paragraph.
</div>



<script type="text/javascript" src="jquery.js"></script>
<script type="text/javascript">
$(function(){
	
	$("#btn1").click(function(){
		$("div").addClass("box");
	});

	$("#btn2").click(function(){
		$("div").removeClass("box");
	});

	$("#btn3").click(function(){
		$("div").toggleClass("box");
	});
	

});
</script>

</body>
</html>
