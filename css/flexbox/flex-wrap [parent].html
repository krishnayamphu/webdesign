<!DOCTYPE html>
<html>
<head>
	<title>Flexbox</title>

	<style type="text/css">
		.item{
			background: orange;
			padding: 15px;
			width: 200px;
		}
		.item:nth-child(even){
			background: green;
		}
		.container1{
			border: 1px solid red;
			margin: 15px;
			padding: 15px;

			display: flex;
			flex-wrap: nowrap;
		}

		.container2{
			border: 1px solid red;
			margin: 15px;
			padding: 15px;

			display: flex;
			flex-wrap: wrap;
		}

		.container3{
			border: 1px solid red;
			margin: 15px;
			padding: 15px;

			display: flex;
			flex-wrap: wrap-reverse;
		}

	</style>
</head>
<body>
	<h4>flex-wrap:nowrap</h4>
	<div class="container1">
		<div class="item">Item 1</div>
		<div class="item">Item 2</div>
		<div class="item">Item 3</div>
		<div class="item">Item 4</div>
		<div class="item">Item 5</div>
		<div class="item">Item 6</div>
	</div>

	<h4>flex-wrap:wrap</h4>
	<div class="container2">
		<div class="item">Item 1</div>
		<div class="item">Item 2</div>
		<div class="item">Item 3</div>
		<div class="item">Item 4</div>
		<div class="item">Item 5</div>
		<div class="item">Item 6</div>
	</div>

	<h4>flex-wrap:wrap-reverse</h4>
	<div class="container3">
		<div class="item">Item 1</div>
		<div class="item">Item 2</div>
		<div class="item">Item 3</div>
		<div class="item">Item 4</div>
		<div class="item">Item 5</div>
		<div class="item">Item 6</div>
	</div>
</body>
</html>
