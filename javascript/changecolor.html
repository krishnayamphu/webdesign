<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>js</title>
  </head>
  <body>
    <script>
      let i = 0;
      function changeBg() {
        const color = ["red", "green", "blue"];
        document.bgColor = color[i];
        i++;
        if (i == color.length) {
          i = 0;
        }
      }

      setInterval("changeBg()", 2000);
    </script>
  </body>
</html>
