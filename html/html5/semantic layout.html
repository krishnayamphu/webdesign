<!DOCTYPE html>
<html>
<head>
	<title>html5</title>
	<style type="text/css">
		*{
			font-family: arial;
			margin: 0;
			padding: 0;
			color:white;
		}
		header{
			height: 100px;
			background: green;
		}
		nav{
			height: 60px;
			background-color: purple;
		}

		main{
			background-color:orange;
			clear: both;
		}
		.content{
			width: 65%;
			background-color: teal;
			float: left;
		}
		section{
			height: 200px;
			background-color: blue;
		}
		article{
			height: 200px;
			background-color: yellow;
		}
		aside{
			width: 35%;
			height: 400px;
			background-color: red;
			float: right;
		}

		footer{
			height: 100px;
			background: black;
			color:white;
			clear: both;
		}
	</style>
</head>
<body>

<header>Header</header>
<nav>Navigation</nav>
<main>
	<div class="content">
		<section>Section</section>
		<article>Article</article>
	</div>
	<aside>Aside</aside>
</main>
<footer>Footer</footer>
</body>
</html>
