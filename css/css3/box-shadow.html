<!DOCTYPE html>
<html>
<head>
	<title>css</title>
	<style type="text/css">
		*{
			margin: 0;
			padding: 0;
			font-family: arial;
		}

		div{
			width: 100px;
			height: 100px;
			float: left;
			margin: 1rem; /* 1rem=16px*/
		}
		.shadow1{
			background: purple;
			box-shadow: 5px 5px 2px #333;
		}
		.shadow2{
			box-shadow: 0 0 10px #000;
		}

		.shadow3{
			background: purple;
			box-shadow: 0 10px 2px #333;
		}
		.shadow4{
			background: purple;
			box-shadow:0 0 10px 20px #333;
		}
		.shadow5{
			box-shadow: 0 0 10px #a80f0f inset;
		}

		.shadow6{
			background: #ccc;
			box-shadow: 5px 5px 2px green,-5px -5px 2px red;
		}

		.shadow7{
			border-radius: 50%;
			background: #fff;
			box-shadow:0 0 20px  yellow inset, 0 0 2px 2px green,0 0 8px 8px red;
		}
		.shadow8{
			background: #ccc;
		}
		.shadow8:hover{
			box-shadow:0 0 8px 8px #222;
		}
	</style>
</head>
<body>

<div class="shadow1"></div>
<div class="shadow2"></div>
<div class="shadow3"></div>
<div class="shadow4"></div>
<div class="shadow5"></div>
<div class="shadow6"></div>
<div class="shadow7"></div>
<div class="shadow8"></div>
</body>
</html>
