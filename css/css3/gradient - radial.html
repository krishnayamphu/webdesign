<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>css3</title>
    <style>
      div {
        width: 200px;
        height: 100px;
        border: 1px solid red;
        float: left;
        margin: 15px;
      }
      .box1{
        background-image: radial-gradient(red,blue);
      }
      .box2{
        background-image: radial-gradient(circle,red,blue);
      }

      .box3{
        background-image: radial-gradient(red,yellow,blue);
      }
      .box4{
        background-image:radial-gradient(circle, red,blue 40%);
      }

      .box5{
        background-image:radial-gradient(red,green 38%,yellow 42%,blue);
      }
      .box6{
        background-image: radial-gradient(rgba(255, 0, 0, 0.222),blue);
      }
        .box7{
        background-image: repeating-radial-gradient(circle,rgb(236, 204, 204),blue 25% );
      }
    
    </style>
  </head>
  <body>
    <div class="box1"></div>
    <div class="box2"></div>
    <div class="box3"></div>
    <div class="box4"></div>
    <div class="box5"></div>
    <div class="box6"></div>
    <div class="box7"></div>

    </div>
  </body>
</html>
