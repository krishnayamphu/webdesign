<!DOCTYPE html>
<html>
<head>
	<meta charset="utf-8">
	<title>JS</title>
</head>
<body>
<input type="text" id="heading" value="Hello World">
<p id="test"></p>

<script type="text/javascript">
document.getElementById("test").innerHTML="Welcome to JS";
document.getElementById("test").align="center";
document.getElementById("test").style.color="green";
document.getElementById("test").style.backgroundColor="grey";

var text=document.getElementById("heading").value;
alert(text);
</script>
</body>
</html>
