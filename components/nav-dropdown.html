<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>css</title>
    <style>
      * {
        font-family: Arial, Helvetica, sans-serif;
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      nav {
        background-color: aquamarine;
        width: 90%;
        margin: 15px auto;
      }
      nav ul {
        list-style: none;
      }
      nav ul li {
        display: inline-block;
      }
      nav ul li a {
        text-decoration: none;
        color: black;
        display: block;
        padding: 10px 20px;
      }
      nav ul li a:hover {
        background-color: tomato;
        color: white;
      }
      nav ul ul {
        position: absolute;
        background-color: antiquewhite;
        display: none;
      }
      nav ul ul li {
        display: block;
      }
      nav ul li:hover ul {
        display: block;
      }
      nav ul li a.active {
        background-color: tomato;
        color: white;
      }
    </style>
  </head>
  <body>
    <nav>
      <ul>
        <li>
          <a class="active" href="#">Home</a>
        </li>
        <li>
          <a href="#">Services</a>
          <ul>
            <li>
              <a href="#">Services 1</a>
            </li>
            <li>
              <a href="#">Services 2</a>
            </li>
            <li>
              <a href="#">Services 3</a>
            </li>
          </ul>
        </li>
        <li>
          <a href="#">About</a>
        </li>
        <li>
          <a href="#">Gallery</a>
        </li>
        <li>
          <a href="#">Courses</a>
          <ul>
            <li>
              <a href="#">Basic</a>
            </li>
            <li>
              <a href="#">Web Design</a>
            </li>
            <li>
              <a href="#">Programming</a>
            </li>
          </ul>
        </li>
        <li>
          <a href="#">Contact</a>
        </li>
      </ul>
    </nav>
  </body>
</html>
