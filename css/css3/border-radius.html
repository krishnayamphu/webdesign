<!DOCTYPE html>
<html>
<head>
	<title>css</title>
	<style type="text/css">
	div{
		width: 100px;
		height: 100px;
		border: 5px solid red;
		float: left;
		margin: 15px;
	}
	.box1{
		-webkit-border-radius: 10px; /* chrome|safari */
		-moz-border-radius: 10px; /* mozilla firefox */
		-ms-border-radius: 10px;  /* internet explore */
		-o-border-radius: 10px;  /* opera */
		border-radius: 10px;   /* standard|latest version */
	}

	.box2{border-radius: 0px 100px 100px 100px}
	.box3{border-radius: 0px 0px 100px 100px}
	.box4{border-radius: 0px 100px 0px 100px}
	.box5{border-radius: 0px 30px 50px 100px}
	.box6{border-radius: 0px 20px 0px 20px}
	.box7{border-radius: 30px 0;}
	.box8{border-radius: 50%;}
	.box9{
		width: 200px;
		height: 50px;
		border-radius: 50px;
	}
	
	</style>
</head>
<body>

<div class="box1"></div>
<div class="box2"></div>
<div class="box3"></div>
<div class="box4"></div>
<div class="box5"></div>
<div class="box6"></div>
<div class="box7"></div>
<div class="box8"></div>
<div class="box9"></div>
</body>
</html>
