<!DOCTYPE html>
<html>
<head>
	<title>Flexbox</title>

	<style type="text/css">
		.container1{
			border: 1px solid red;
			display: flex;
		}
	 	.item1{
			background-color: orange;
			padding: 5px 15px;
			flex-grow: 1;
			order: 3;
		}
		.item2{
			background-color: green;
			padding: 5px 15px;
			flex-grow: 1;
			order: 2;
		}
		.item3{
			background-color: skyblue;
			padding: 5px 15px;
			flex-grow: 1;
			order: 1;
		}
	 	


	</style>
</head>
<body>
	<h4>flex-shrink:3</h4>
	<div class="container1">
		<div class="item1">Item 1</div>
		<div class="item2">Item 2</div>
		<div class="item3">Item 3</div>
	</div>
</body>
</html>
