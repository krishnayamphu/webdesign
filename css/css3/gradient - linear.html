<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>css3</title>
    <style>
      div {
        width: 100px;
        height: 100px;
        border: 1px solid red;
        float: left;
        margin: 15px;
      }
      .box1{
        background-image: linear-gradient(red,blue);
      }
      .box2{
        background-image: -webkit-linear-gradient(left,red,blue);
      }

      .box3{
        background-image: -webkit-linear-gradient(top left,red,blue);
      }
      .box4{
        background-image:-webkit-linear-gradient(20deg, red,blue);
      }

      .box5{
        background-image: -webkit-linear-gradient(top left,red,green,yellow,blue);
      }
      .box6{
        background-image: -webkit-linear-gradient(left,red 20%,green 50%,blue 50%);
      }
        .box7{
        background-image: -webkit-linear-gradient(left,red ,rgba(0, 0, 255, 0.112) );
      }
        .box8{
        background-image: -webkit-repeating-linear-gradient(45deg,rgb(215, 139, 139),blue 25%);
      }
    </style>
  </head>
  <body>
    <div class="box1"></div>
    <div class="box2"></div>
    <div class="box3"></div>
    <div class="box4"></div>
    <div class="box5"></div>
    <div class="box6"></div>
    <div class="box7"></div>
    <div class="box8"></div>
    </div>
  </body>
</html>
