<!DOCTYPE html>
<html>
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title>js</title>
</head>
<body>

<script type="text/javascript">

/*
break,continue
==============


*/

for(i=1;i<=5;i++){
	document.write("<br>"+i);
	if(i==3){
		break;
	}
}

document.write("<br>");
for(i=1;i<=5;i++){
	if(i==3){
		continue;
	}
	document.write(" "+i);
}

document.write("<br>");
for(i=1;i<=5;i++){
	if(i==2||i==4){
		continue;
	}
	document.write(" "+i);
}

</script>

</body>
</html>
