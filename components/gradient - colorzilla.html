<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>css3</title>
    <style>
      div {
        width: 300px;
        height: 300px;
        border: 1px solid red;
        float: left;
        margin: 15px;
      }
      .box1 {
        background: linear-gradient(
          to bottom,
          #f85032 0%,
          #f16f5c 50%,
          #f6290c 51%,
          #f02f17 71%,
          #e73827 100%
        );
      }

      .box2 {
        background: linear-gradient(
          135deg,
          #aebcbf 0%,
          #6e7774 50%,
          #0a0e0a 51%,
          #87997a 100%
        );
      }
    </style>
  </head>
  <body>
    <div class="box1"></div>
    <div class="box2"></div>
  </body>
</html>
