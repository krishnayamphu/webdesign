<!DOCTYPE html>
<html>
<head>
	<title>Flexbox</title>

	<style type="text/css">
		.container1{
			border: 1px solid red;
			margin: 15px;
			padding: 15px;
			height: 300px;
			width: 300px;

			display: flex;
			align-items: center;
		}

		.item{
			background: orange;
			padding: 15px;
			flex-grow: 1;
		}
		.item:nth-child(even){
			background: green;
			align-self: flex-start;
		}
		
	</style>
</head>
<body>
	<h4>align-self:flex-start</h4>
	<div class="container1">
		<div class="item">Item 1</div>
		<div class="item">Item 2</div>
		<div class="item">Item 3</div>
	</div>
</body>
</html>
