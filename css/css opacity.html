<!DOCTYPE html>
<html>
<head>
	<title>css</title>
	<style type="text/css">
		
	img{
		width: 200px;
	}
	img:hover{
		opacity: 1;
	}
	.opacity-50{
		opacity: 0.5; /* 50%*/ 
	}
	.opacity-10{
		opacity: 0.1;
	}

	</style>
</head>
<body>
<img src="fish.jpg">
<img class="opacity-50" src="fish.jpg">
<img class="opacity-10" src="fish.jpg">
</body>
</html>
