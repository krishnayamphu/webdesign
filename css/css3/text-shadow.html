<!DOCTYPE html>
<html>
<head>
	<title>css</title>
	<style type="text/css">
		*{
			margin: 0;
			padding: 0;
			font-family: arial;
		}

		h1{
			font-size: 48px;
		}
		.shadow1{
			text-shadow: 5px 5px 2px #333;
		}
		
		.shadow2{
			color:white;
			text-shadow: 0 0 5px green;
		}

		.shadow3{
			color:white;
			text-shadow: 0 0 2px red;
		}
		.shadow4{
			color: white;
			text-shadow:-2px -2px 2px green,2px 2px 2px blue;
		}
			

		.shadow5{color:black;}
		.shadow5:hover{
			color:white;
			text-shadow:-2px -2px 2px purple,2px 2px 2px red;
		}
	</style>
</head>
<body>

<h1 class="shadow1">TEXT SHADOW</h1>
<h1 class="shadow2">TEXT SHADOW</h1>
<h1 class="shadow3">TEXT SHADOW</h1>
<h1 class="shadow4">TEXT SHADOW</h1>
<h1 class="shadow5">TEXT SHADOW</h1>
</body>
</html>
