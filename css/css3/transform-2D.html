<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>css3</title>
    <style>
      div {
        width: 100px;
        height: 100px;
        background-color: red;
        float: left;
        margin: 15px;
        transition: all 1s;
        color: white;
      }
      .box1:hover {
        transform: translate(0px, 50px);
      }
      .box2:hover {
        transform: rotate(15deg);
      }
      .box3:hover {
        transform: scale(1.5);
      }
      .box4:hover {
        transform: skew(45deg, 5deg);
      }
    </style>
  </head>
  <body>
    <div class="box1">translate</div>
    <div class="box2">rotate</div>
    <div class="box3">scale</div>
    <div class="box4">skew</div>
  </body>
</html>
