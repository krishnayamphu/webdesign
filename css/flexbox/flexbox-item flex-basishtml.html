<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Flexbox</title>
    <style>
      * {
        font-family: Arial, Helvetica, sans-serif;
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      .row {
        border: 1px solid red;
        margin: 15px 30px;
        display: flex;
      }
      .col {
        background-color: green;
      }

      .col:nth-child(even) {
        background-color: orange;
      }
      .col:last-child {
        background-color: rgb(178, 67, 184);
      }
        .fb-100{
        flex-basis: 200px;
        }
        .fb-300{
        flex-basis: 300px;
        }
    </style>
  </head>
  <body>
    <div class="row">
      <div class="col fb-100">col1</div>
      <div class="col">col2</div>
      <div class="col">col3</div>
    </div>

    <div class="row">
      <div class="col fb-300">col1</div>
      <div class="col">col2</div>
      <div class="col">col3</div>
    </div>   
</div>
    </div>
  </body>
</html>
