<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>JavaScript</title>
  </head>
  <body>
    <script>
      let a = 5;
      a++;
      document.write(a);
      document.write("<br>");
      document.write(20 % 5);

      let x = 10;
      x += 5;
      document.write("<br>");
      document.write(x);

      let p = 5,
        q = 6,
        r = 5;
      document.write("<br>" + (p > q));
      document.write("<br>" + (p > r));
      document.write("<br>" + (q > p));
    </script>
  </body>
</html>
