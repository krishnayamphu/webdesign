<!DOCTYPE html>
<html>
<head>
	<title>html</title>
	<style type="text/css">
	div{float: left;}
	.box1{
		width: 150px;
		height: 150px;
		margin: 15px;
		border:5px solid red;
	}
	.box2{
		width: 150px;
		height: 150px;
		margin: 15px;
		border:5px dashed red;
	}
	.box3{
		width: 150px;
		height: 150px;
		margin: 15px;
		border:5px dotted red;
	}
	.box4{
		width: 150px;
		height: 150px;
		margin: 15px;
		border:5px groove red;
	}
	.box5{
		width: 150px;
		height: 150px;
		margin: 15px;
		border:5px outset red;
	}
	.box6{
		width: 150px;
		height: 150px;
		margin: 15px;
		border:5px inset red;
	}

	.box7{
		width: 150px;
		height: 150px;
		margin: 15px;
		border:5px solid red;
		border-left: none;
	}

	.box8{
		width: 150px;
		height: 150px;
		margin: 15px;
		border-left:5px groove red;
		background-color: grey;
	}

	.box9{
		width: 50px;
		height: 50px;
		margin: 15px;
		border-left:50px solid red;
		border-right: 50px solid green;
		border-top:50px solid blue;
		border-bottom: 50px solid yellow;
	}

	.box10{
		width: 0px;
		height: 0px;
		margin: 15px;
		border-left:50px solid red;
		border-right: 50px solid green;
		border-top:50px solid blue;
		border-bottom: 50px solid yellow;
	}
	.box11{
		width: 0px;
		height: 0px;
		margin: 15px;
		border-left:50px solid red;
		border-right: 50px solid transparent;
		border-top:50px solid transparent;
		border-bottom: 50px solid transparent;
	}
	</style>
</head>
<body>

<div class="box1"></div>
<div class="box2"></div>
<div class="box3"></div>
<div class="box4"></div>
<div class="box5"></div>
<div class="box6"></div>
<div class="box7"></div>
<div class="box8"></div>
<div class="box9"></div>
<div class="box10"></div>
<div class="box11"></div>
</body>
</html>
