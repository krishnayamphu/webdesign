<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>jquery</title>
    <style>
      * {
        font-family: Arial, Helvetica, sans-serif;
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
    </style>
  </head>
  <body>
    <button id="btn1">Get Value</button>
    <button id="btn2">Set Value</button>
    <input type="text" value="hello" />
    <script src="jquery-3.7.1.min.js"></script>
    <script>
      $(function () {
        $("#btn1").click(function () {
          let data = $("input").val();
          alert(data);
        });

        $("#btn2").click(function () {
          let data = "welcome";
          $("input").val(data);
        });
      });
    </script>
  </body>
</html>
