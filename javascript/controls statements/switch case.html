<!DOCTYPE html>
<html>
<head>
	<title>js</title>
</head>
<body>
<script type="text/javascript">
	var day=70;
	switch(day){
		case 1:
		document.write("Sun"); break;
		case 2:
		document.write("Mon"); break;
		case 3:
		document.write("Tue"); break;
		case 4:
		document.write("Wed"); break;
		case 5:
		document.write("Thu"); break;
		case 6:
		document.write("Fri"); break;
		case 7:
		document.write("Sat"); break;
		default:
		document.write("Invalid day no."); break;
	}

</script>
</body>
</html>
