<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>jQuery</title>
    <style>
        p{
            font-family: Arial, Helvetica, sans-serif;
            background-color: aquamarine;
            padding: 15px;
            margin: 0;
            margin-top: 15px;
        }
    </style>
  <body>
    <button id="btn1">SlideUp</button>
    <button id="btn2">SlideDown</button>
    <button id="btn3">SlideToggle</button>
    <p>
      Lorem ipsum dolor sit amet consectetur adipisicing elit. Tempore unde
      doloribus ab ipsa laboriosam maxime. Qui, provident perferendis temporibus
      nihil consequatur consectetur corporis corrupti inventore vitae, quam
      nesciunt earum sapiente!
    </p>
    <script src="jquery-3.7.1.min.js"></script>
    <script>
      $(document).ready(function () {
        
        $("#btn1").click(function () {
          $("p").slideUp(1000)
        });

      
        $("#btn2").click(function () {
          $("p").slideDown(1000)
        });

      
        $("#btn3").click(function () {
          $("p").slideToggle(1000)
        });
      });
    </script>
  </body>
</html>
