<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>JavaScript</title>
  </head>
  <body id="app">
    <input type="text" id="name" oninput="changeCase()" />
    <p>Length:<span id="count"></span></p>
    <script>
      function changeCase() {
        let name = document.getElementById("name").value;
        document.getElementById("name").value = name.toUpperCase();
        document.getElementById("count").innerHTML = name.length;
      }
    </script>
  </body>
</html>
