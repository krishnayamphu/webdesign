<!DOCTYPE html>
<html>
<head>
	<title>css3</title>
	<style type="text/css">

		div{
			width: 300px;
			height: 400px;
			background:url('fish.jpg') green no-repeat;
			float: left;
			margin:15px;
			border: 5px solid red;
		}
		.box2{
			background-size: cover;
		}
		.box3{
			background-size: contain;
		}
		.box4{
			background-size: 100% 100%;
		}
	</style>
</head>
<body>
	<div class="box1">100x100</div>
	<div class="box2">100x100</div>
	<div class="box3">100x100</div>
	<div class="box4">100x100</div>
</body>
</html>
