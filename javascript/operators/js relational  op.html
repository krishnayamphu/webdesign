<!DOCTYPE html>
<html>
<head>
	<meta charset="utf-8">
	<title>JS</title>
</head>
<body>
<script type="text/javascript">
var x=5; //number
var y=10;
var z=5;

var username="admin";
var password="admin123";

document.write("<br>"+(password!="guest123"));
