<!DOCTYPE html>
<html>
<head>
	<title>css</title>
	<style type="text/css">
	/*

    a:link - a normal, unvisited link
    a:visited - a link the user has visited
    a:hover - a link when the user mouses over it
    a:active - a link the moment it is clicked
*/
a{text-decoration: none;	}

a:visited{
	color:#ccc;
}
a:hover{
	color: purple;
	
}
a:active{
	color:orange;
}
</style>
</head>
<body>

<a href="#1">Link 1</a>
<a href="#2">Link 2</a>
<a href="#3">Link 3</a>
<a href="#4">Link 4</a>

</body>
</html>
