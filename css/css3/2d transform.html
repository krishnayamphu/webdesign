<!DOCTYPE html>
<html>
<head>
	<title>css3</title>
	<style type="text/css">
		*{
			margin: 0;
			padding: 0;
			font-family: arial;
			transition: all 1s;
		}

		div{
			width: 100px;
			height: 100px;
			background: green;
			float: left;
			margin: 2rem; //1rem=16px
		}

		.translateX:hover{
			transform: translate(100px,0);
		}
		.translateY:hover{
			transform: translate(0,100px);
		}
		.translate:hover{
			transform: translate(-100px,-100px);
		}
		.rotate:hover{
			transform: rotate(360deg);
		}
		.scaleX:hover{
			transform: scaleX(2);
		}
		.scaleY:hover{
			transform: scaleY(2);
		}
		.scale:hover{
			transform: scale(1.5);
		}

		.skew:hover{
			transform: skew(10deg,10deg);
		}
		

	</style>
</head>
<body>

<div class="translateX"></div>
<div class="translateY"></div>
<div class="translate"></div>

<div class="rotate">text</div>

<div class="scaleX"></div>
<div class="scaleY"></div>

<div class="scale"></div>


<div class="skew"></div>

<div class="skew">skew</div>

</body>
</html>
